<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول - Nexus</title>


    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style/style.css" />
    <link rel="stylesheet" href="style/SignUp.css">


</head>

<body>
    <div class="signup-card">

        <div class="header">
            <img src="img/logo.jpeg" alt="" style="width: 100px;">
            <h2>إنشاء حساب جديد</h2>
            <p>انضم إلى منصة Nexus وابدأ رحلتك المهنية</p>
        </div>

        <form>


            <div class="form-grid">

                <div class="form-group full-width">
                    <label>البريد الإلكتروني</label>
                    <input type="email" placeholder="example@mail.com">
                </div>

                <div class="form-group full-width">
                    <label>كلمة المرور</label>
                    <input type="password" placeholder="********">
                </div>
            </div>



            <div class="terms-text" style="display: flex; justify-content: space-between;">
                <div class="terms-text " style="display: flex; gap: 10px;">
                    <input type="checkbox" id="terms">
                    تذكرني
                </div>

                <a href="profail.html"> نسيت كلمة المرور؟</a>
            </div>


                <button type="submit" class="btn-submit"> تسجيل الدخول</button>
            <p class="footer-text">
                ليس لديك حساب ؟ <a href="SignUp.html">انشاء حساب</a>
            </p>
        </form>
    </div>
</body>

</html>
