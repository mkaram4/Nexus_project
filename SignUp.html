<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="img/logo.jpeg" type>
    <title>إنشاء حساب - Nexus</title>


    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style/style.css" />
    <link rel="stylesheet" href="style/SignUp.css">


</head>

<body>

    <div class="signup-card">

        <div class="header">
            <img src="img/logo.jpeg" alt="" style="width: 100px;">
            <h2>إنشاء حساب جديد</h2>
            <p>انضم إلى منصة Nexus وابدأ رحلتك المهنية</p>
        </div>

        <form>
            <div class="user-type">
                <label class="type-option">
                    <input type="radio" name="role" value="student" checked onchange="toggleFields()">
                    <div class="type-box">
                        <i class="fa-solid fa-user-graduate"></i>
                        <span>طالب</span>
                    </div>
                </label>
                <label class="type-option">
                    <input type="radio" name="role" value="company" onchange="toggleFields()">
                    <div class="type-box">
                        <i class="fa-solid fa-building"></i>
                        <span>شركة</span>
                    </div>
                </label>
            </div>

            <div class="form-grid">

                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" placeholder="example@mail.com">
                </div>
                <div class="form-group">
                    <label>الاسم الكامل/اسم المسؤول </label>
                    <input type="text" placeholder="أدخل اسمك الثلاثي">
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" placeholder="********">
                </div>
                <div class="form-group">
                    <label>تأكيد كلمة المرور</label>
                    <input type="password" placeholder="********">
                </div>

                <div class="form-group full-width">
                    <label>رقم الهاتف</label>
                    <input type="tel" placeholder="059-000-0000">
                </div>

                <div class="form-group  student-fields">
                    <label>التخصص</label>
                    <input type="text" placeholder="التخصص">
                </div>
                <div class="form-group student-fields">
                    <label>الجامعة</label>
                    <input type="text" placeholder="الجامعة">
                </div>
                <div class="form-group full-width student-fields">
                    <label>سنة التخرج المتوقعة</label>
                    <input type="text" placeholder="سنة التخرج المتوقعة">
                </div>

                <div class="form-group full-width company-field">
                    <label>اسم الشركة</label>
                    <input type="text" placeholder="أدخل اسم المنشأة">
                </div>
                <div class="form-group  company-field">
                    <label>حجم الشركة</label>
                    <input type="text" placeholder="حجم الشركة">
                </div>
                <div class="form-group company-field">
                    <label>القطاع</label>
                    <input type="text" placeholder="القطاع">
                </div>
                <div class="form-group full-width company-field">
                    <label>موقع الشركة (اختياري)</label>
                    <input type="text" placeholder="موقع الشركة">
                </div>
            </div>


            <div class="form-group full-width terms-group">
                <label class="checkbox-container">
                    <input type="checkbox" id="terms" required>
                    <span class="checkmark"></span>
                    <span class="terms-text">أوافق على <a href="#">الشروط والأحكام</a> و <a href="#">سياسة
                            الخصوصية</a></span>
                </label>
            </div>


            <button type="submit" class="btn-submit">إنشاء الحساب</button>

            <p class="footer-text">
                لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a>
            </p>
        </form>
    </div>

    <script>
        function toggleFields() {
            const role = document.querySelector('input[name="role"]:checked').value;
            console.log(role);

            const companyFields = document.querySelectorAll('.company-field');

            const studentFields = document.querySelectorAll('.student-fields');

            companyFields.forEach(field => {
                field.style.display = (role === 'company') ? 'block' : 'none';
            });

            studentFields.forEach(student => {
                student.style.display = (role === "student") ? 'block' : 'none';
            });
        }
    </script>
</body>

</html>
